<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深度内在原型剖析：你的灵魂科学家</title>
    <!-- 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 高清截图库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #FDFBF7; 
            --panel-bg: #FFFFFF;
            --text-main: #4A4036; 
            --text-muted: #9BA4B5;
            --accent: #C1A073; 
            --accent-light: #F4EFE6; 
            --border: #EAE1D8;
            --error: #E06C75; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--panel-bg);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(160, 150, 140, 0.1);
            margin-top: 3vh;
            margin-bottom: 5vh;
            border: 1px solid rgba(255,255,255,0.8);
            position: relative; 
        }

        /* 截图时的特殊状态 */
        .capturing { box-shadow: none !important; border: none !important; margin: 0 !important; border-radius: 0 !important;}

        h1 { font-size: 22px; text-align: center; font-weight: 600; letter-spacing: 1px; color: var(--text-main); margin-bottom: 6px; }
        .subtitle { font-size: 12px; color: var(--accent); text-align: center; margin-bottom: 35px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500;}

        /* 登录页 */
        #login-screen { text-align: center; }
        .login-illustration { font-size: 40px; margin-bottom: 20px; color: var(--accent); }
        .input-group { margin: 20px 0 10px 0; }
        input[type="text"] {
            width: 100%; background: var(--bg-color); border: 1.5px solid var(--border);
            color: var(--text-main); padding: 16px; border-radius: 12px;
            font-size: 18px; text-align: center; letter-spacing: 2px; outline: none; transition: all 0.3s ease;
        }
        input[type="text"]:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 10px rgba(193, 160, 115, 0.1); }
        input[type="text"]::placeholder { color: #D1C8C0; font-size: 14px; letter-spacing: 1px; }
        
        .shake { animation: shakeError 0.4s ease-in-out; border-color: var(--error) !important; color: var(--error) !important; }
        @keyframes shakeError { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }

        .error-msg { color: var(--error); font-size: 13px; min-height: 20px; margin-bottom: 20px; opacity: 0; transition: opacity 0.3s; }
        .error-msg.show { opacity: 1; }

        .btn {
            width: 100%; background: var(--text-main); color: #fff; border: none; padding: 16px; 
            border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; 
            transition: 0.3s; margin-bottom: 20px; letter-spacing: 1px;
        }
        .btn:hover { background: var(--accent); }
        .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
        .btn-outline:hover { background: var(--accent-light); color: var(--text-main); border-color: var(--accent); }
        
        .disclaimer { font-size: 11px; color: #B3AAA0; text-align: justify; line-height: 1.8; margin-top: 30px; border-top: 1px dashed var(--border); padding-top: 20px;}

        /* 测试页 */
        #test-screen { display: none; }
        .progress-bar { width: 100%; height: 6px; background: var(--accent-light); border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; border-radius: 4px;}
        .progress-text { font-size: 12px; color: var(--accent); text-align: right; margin-bottom: 30px; font-weight: 500; letter-spacing: 1px;}
        .question { font-size: 17px; font-weight: 600; margin-bottom: 25px; line-height: 1.6; color: var(--text-main); }
        .option {
            background: var(--bg-color); border: 1.5px solid var(--border); padding: 16px 20px; 
            border-radius: 12px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; 
            font-size: 14px; color: var(--text-main); line-height: 1.5;
        }
        .option:hover, .option:active { background: var(--accent-light); border-color: var(--accent); transform: translateY(-2px); }

        /* 演算等待页 */
        #loading-screen { display: none; text-align: center; padding: 40px 10px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 15px var(--accent); } 100% { transform: scale(1); opacity: 0.8; } }
        .spinner-box { width: 100%; height: 6px; background: var(--accent-light); border-radius: 4px; overflow: hidden; margin: 35px 0 15px; }
        .spinner-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s linear; border-radius: 4px; }
        .loading-text { font-size: 16px; color: var(--text-main); font-weight: 600; margin-top: 20px;}
        .loading-subtext { font-size: 12px; color: var(--text-muted); }

        /* 结果页 */
        #result-screen { display: none; }
        .report-header { text-align: center; margin-bottom: 30px; border-bottom: 1px dashed var(--border); padding-bottom: 25px; }
        .result-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 5px; }
        .result-title { font-size: 26px; color: var(--accent); font-weight: bold; margin: 10px 0; letter-spacing: 1px;}
        .quote { font-size: 13px; color: #8C7B6B; font-style: italic; margin-top: 10px; padding: 10px; background: var(--accent-light); border-radius: 8px;}
        
        .tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 30px; }
        .tag { background: var(--bg-color); color: var(--accent); padding: 5px 14px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); font-weight: 500;}
        
        .section-title { font-size: 15px; font-weight: 600; color: var(--text-main); margin: 35px 0 15px; display: flex; align-items: center; }
        .section-title::before { content: ''; display: inline-block; width: 4px; height: 16px; background: var(--accent); margin-right: 8px; border-radius: 2px; }
        
        .desc-box { background: var(--bg-color); border-radius: 16px; padding: 25px 20px; font-size: 14px; color: #5C5248; text-align: justify; border: 1px solid var(--border); }
        .desc-box h4 { font-size: 14px; color: var(--accent); margin-bottom: 8px; margin-top: 15px;}
        .desc-box h4:first-child { margin-top: 0; }
        .desc-box p { margin-bottom: 15px; line-height: 1.8; }
        .desc-box p:last-child { margin-bottom: 0; }
        
        /* 图表容器加固 */
        .chart-container { 
            background: #fff; border-radius: 16px; padding: 20px 10px; 
            border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            position: relative; width: 100%;
        }
        
        .match-box { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 30px;}
        .match-item { flex: 1; background: var(--bg-color); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border);}
        .match-item h4 { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: normal; }
        .match-item span { font-size: 14px; color: var(--text-main); font-weight: 600; }
        
        .action-buttons { display: flex; gap: 12px; margin-top: 20px; flex-direction: column; }
        .action-buttons .btn { margin-bottom: 0; }
        
        .watermark { font-size: 11px; color: #D1C8C0; text-align: center; margin-top: 30px; letter-spacing: 1px; padding-bottom: 10px;}
    </style>
</head>
