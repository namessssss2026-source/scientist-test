<!DOCTYPE html>
<html lang="zh-CN">

    <style>

        .view { display: none; width: 100%; flex: 1; flex-direction: column; animation: fadeIn 0.6s ease forwards; opacity: 0; }
        .view.active { display: flex; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(10px); } }

        .card { background: var(--card-bg); border-radius: 20px; padding: 30px 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.03); margin-bottom: 20px; }
        .title { font-size: 24px; font-weight: 700; text-align: center; color: var(--primary); margin-bottom: 8px; letter-spacing: 1px; }
        .subtitle { font-size: 13px; text-align: center; color: var(--text-light); margin-bottom: 24px; letter-spacing: 2px; }
        
        input[type="text"] { width: 100%; background: #F8F6F0; border: 1px solid transparent; padding: 16px; border-radius: 12px; font-size: 15px; text-align: center; margin-bottom: 20px; color: var(--text-dark); outline: none; transition: 0.3s; letter-spacing: 1px;}
        input[type="text"]:focus { border-color: var(--primary); background: #FFF; box-shadow: 0 4px 12px rgba(200, 122, 106, 0.1); }
        
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 16px rgba(200, 122, 106, 0.25); }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 6px rgba(200, 122, 106, 0.25); }

        .progress-text { font-size: 13px; font-weight: bold; color: var(--text-light); margin-bottom: 15px; text-align: center; letter-spacing: 1px;}
        .question-text { font-size: 17px; line-height: 1.6; margin-bottom: 30px; font-weight: 600; text-align: justify; }
        .option { background: var(--bg-color); border: 1px solid transparent; padding: 16px 20px; border-radius: 14px; margin-bottom: 12px; font-size: 15px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; line-height: 1.5; color: #444; }
        .option:active { background: #EFECE3; border-color: var(--primary); transform: scale(0.98); }
        .opt-letter { font-weight: 800; color: var(--primary); margin-right: 15px; font-size: 16px; opacity: 0.8; }

        .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; }
        .spinner { width: 44px; height: 44px; border: 4px solid #EFECE3; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 24px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; color: var(--text-dark); letter-spacing: 1px; font-weight: 500; height: 20px; transition: opacity 0.3s; }

        #poster { background: var(--card-bg); border-radius: 20px; padding: 30px 20px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
        
        .user-info { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        .pre-title { font-size: 12px; color: var(--text-light); letter-spacing: 1px; margin-bottom: 8px; }
        .res-name { font-size: 28px; font-weight: 900; color: var(--primary); margin-bottom: 12px; text-align: center; line-height: 1.3; }
        
        .tags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 25px; }
        .tag { background: var(--tag-bg); color: var(--text-dark); font-size: 12px; padding: 6px 14px; border-radius: 20px; font-weight: 600; letter-spacing: 0.5px;}
        
        .section-title { font-size: 15px; font-weight: 800; color: var(--text-dark); margin: 30px 0 15px 0; display: flex; align-items: center; justify-content: center; }
        .section-title::before, .section-title::after { content: ""; width: 20px; height: 1px; background: #ddd; margin: 0 10px; }
        
        .chart-box { width: 100%; aspect-ratio: 1.1; position: relative; margin-bottom: 10px; }
        
        /* 坐标系回退到极简好看的灰白版本 */
        .coord-box { width: 100%; max-width: 250px; height: 250px; margin: 0 auto 20px auto; background: #faf8f5; border-radius: 16px; position: relative; border: 1px solid #eee; }
        .c-axis-x { position: absolute; top: 50%; left: 8%; right: 8%; height: 1px; background: #ddd; }
        .c-axis-y { position: absolute; left: 50%; top: 8%; bottom: 8%; width: 1px; background: #ddd; }
        .c-label { position: absolute; font-size: 10px; color: #999; font-weight: 500; }
        .c-top { top: 4px; left: 50%; transform: translateX(-50%); }
        .c-bottom { bottom: 4px; left: 50%; transform: translateX(-50%); }
        .c-left { left: 4px; top: 50%; transform: translateY(-50%); }
        .c-right { right: 4px; top: 50%; transform: translateY(-50%); }
        .c-dot { position: absolute; width: 14px; height: 14px; background: var(--primary); border-radius: 50%; border: 2px solid #fff; transform: translate(-50%, -50%); box-shadow: 0 2px 6px rgba(200,122,106,0.4); z-index: 2; }
        
        .commentary { font-size: 14px; line-height: 1.8; color: #444; text-align: justify; margin-bottom: 25px; padding: 0 5px; }
        
        .insight-box { border-radius: 12px; padding: 18px; margin-bottom: 15px; font-size: 13px; line-height: 1.6; text-align: justify; }
        .insight-box.awaken { background: #F0F6F2; border-left: 4px solid var(--green); color: #2C4A3A; }
        .insight-box.trigger { background: #FEF3F3; border-left: 4px solid var(--alert-red); color: #5C2C2C; }
        .insight-title { font-weight: 800; margin-bottom: 8px; font-size: 14px; display: flex; align-items: center; }
        
        .footer-disclaimer { text-align: center; margin-top: 35px; border-top: 1px dashed #E5E5E5; padding-top: 20px; }
        .disclaim-text { font-size: 10px; color: #B3B3B3; line-height: 1.6; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-login" class="view active card" style="margin: auto 0;">

            <div class="insight-box awaken">

                    <strong>© 2024 测测看文化创意工作室</strong>

            </div>

    </div>
</div>

    function startTest() {
        const input = document.getElementById('pwd').value.trim();
        if(input !== VALID_PWD) {
            alert("密钥无效。请使用专属内部通道密钥哦。");
            return;
        }
        document.getElementById('view-login').classList.remove('active');
        document.getElementById('view-quiz').classList.add('active');
        renderQ();
    }

    const letters = ['A','B','C','D','E'];
    function renderQ() {
        if(currQ >= QData.length) {
            startLoading();
            return;
        }
        document.getElementById('q-num').innerText = `潜意识扫描 ${String(currQ+1).padStart(2,'0')} / 25`;
        document.getElementById('q-text').innerText = QData[currQ].q;
        
        const box = document.getElementById('opts-box');
        box.innerHTML = '';
        QData[currQ].o.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<span class="opt-letter">${letters[idx]}</span> <span>${opt[0]}</span>`;
            div.onclick = () => {
                for(let i=0; i<5; i++) totalScore.radar[i] += opt[1][i];
                totalScore.coord.x += opt[1][5];
                totalScore.coord.y += opt[1][6];
                currQ++;
                renderQ();
            };
            box.appendChild(div);
        });
    }

    function startLoading() {
        document.getElementById('view-quiz').classList.remove('active');
        document.getElementById('view-loading').classList.add('active');
        
        // 更贴近专业测试的真实话术，去科幻感
        const msgs = ["正在整合行为特征数据...", "正在交叉比对决策逻辑...", "提取多维人格特质...", "生成专属心智图谱..."];
        let mIdx = 0;
        const msgEl = document.getElementById('loading-msg');
        const timer = setInterval(() => {
            mIdx++;
            if(mIdx < msgs.length) {
                msgEl.style.opacity = 0;
                setTimeout(()=> { msgEl.innerText = msgs[mIdx]; msgEl.style.opacity = 1; }, 300);
            } else {
                clearInterval(timer);
                showResult();
            }
        }, 1200);
    }

    function showResult() {
        document.getElementById('view-loading').classList.remove('active');
        document.getElementById('view-result').classList.add('active');

        let quad = "Q1";
        const x = totalScore.coord.x;
        const y = totalScore.coord.y;
        if(x >= 0 && y >= 0) quad = "Q1"; 
        if(x < 0 && y >= 0) quad = "Q2";  
        if(x < 0 && y < 0) quad = "Q3";   
        if(x >= 0 && y < 0) quad = "Q4";  

        const arc = Archetypes[quad];
        document.getElementById('res-name').innerHTML = arc.name;
        document.getElementById('res-desc').innerHTML = arc.desc;
        document.getElementById('res-awaken').innerHTML = arc.awaken;
        document.getElementById('res-trigger').innerHTML = arc.trigger;
        
        const tagsBox = document.getElementById('res-tags');
        tagsBox.innerHTML = '';
        arc.tags.forEach(t => {
            tagsBox.innerHTML += `<span class="tag">${t}</span>`;
        });

        // 坐标系点渲染
        let limit = 50; 
        let px = ((x + limit) / (limit * 2)) * 100;
        let py = ((limit - y) / (limit * 2)) * 100; 
        px = Math.max(15, Math.min(px, 85));
        py = Math.max(15, Math.min(py, 85));
        setTimeout(()=>{
            document.getElementById('c-dot').style.left = `${px}%`;
            document.getElementById('c-dot').style.top = `${py}%`;
        }, 600);

        // --- 雷达图视觉平滑算法 ---
        // 核心：使用 Data Normalization，把极其悬殊的分数映射到 [60, 100] 区间
        // 这样图形永远是一个多边形，既能看出偏科倾向，又绝对好看饱满
        const maxVal = Math.max(...totalScore.radar, 1);
        const mappedData = totalScore.radar.map(v => {
            let ratio = v / maxVal;
            // 最低分也会给到60%的面积展示，最高分是100%
            return Math.round(60 + ratio * 40); 
        });
        drawRadar(mappedData);
    }

    function drawRadar(data) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        Chart.defaults.font.family = '-apple-system, "PingFang SC", sans-serif';
        Chart.defaults.color = '#888';

        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['绝对逻辑', '精神直觉', '现实行动', '深度共情', '秩序构建'],
                datasets: [{
                    data: data,
                    backgroundColor: 'rgba(200, 122, 106, 0.15)', // 降低一点填充透明度显得更高级
                    borderColor: '#C87A6A',
                    borderWidth: 2,
                    pointBackgroundColor: '#FFF',
                    pointBorderColor: '#C87A6A',
                    pointBorderWidth: 2,
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 }, 
                scales: {
                    r: {
                        angleLines: { color: 'rgba(0,0,0,0.06)' },
                        grid: { color: 'rgba(0,0,0,0.06)' },
                        pointLabels: { font: { size: 12, weight: '700' }, color: '#666' },
                        // 强制写死0-100，配合上面的[60-100]映射算法
                        ticks: { display: false, min: 0, max: 100 }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function saveImg() {
        const btn = document.getElementById('btn-save');
        btn.innerText = "正在生成，请保持在当前页面...";
        btn.style.opacity = "0.7";
        
        window.scrollTo(0,0);
        const target = document.getElementById('poster');

        html2canvas(target, {
            scale: window.devicePixelRatio * 2,
            useCORS: true,
            backgroundColor: "#FFFFFF"
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `我的人格原理解析.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            btn.innerText = "✨ 已保存！快去小红书发帖吧";
            btn.style.background = "var(--green)";
            
            setTimeout(() => {
                btn.innerText = "一键生成专属图文海报";
                btn.style.background = "";
                btn.style.opacity = "1";
            }, 3000);
        });
    }
