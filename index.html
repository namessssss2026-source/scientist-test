        .opt-letter { font-weight: bold; color: var(--primary); margin-right: 15px; font-size: 16px; opacity: 0.7; }

        .spinner { width: 50px; height: 50px; border: 4px solid #EFECE3; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 30px; }

        .tag { background: var(--tag-bg); color: var(--text-dark); font-size: 12px; padding: 5px 14px; border-radius: 20px; font-weight: 500; letter-spacing: 1px;}

        .section-title::before { content: ""; width: 4px; height: 14px; background: var(--primary); border-radius: 2px; margin-right: 8px; }
        
        .chart-box { width: 100%; aspect-ratio: 1.2; position: relative; margin-bottom: 20px; }
        
        .coord-box { width: 100%; max-width: 260px; height: 260px; margin: 0 auto 20px auto; background: #faf8f5; border-radius: 16px; position: relative; border: 1px solid #eee; }
        .c-axis-x { position: absolute; top: 50%; left: 10%; right: 10%; height: 1px; background: #ddd; }
        .c-axis-y { position: absolute; left: 50%; top: 10%; bottom: 10%; width: 1px; background: #ddd; }
        .c-label { position: absolute; font-size: 10px; color: var(--text-light); }
        .c-top { top: 5px; left: 50%; transform: translateX(-50%); }
        .c-bottom { bottom: 5px; left: 50%; transform: translateX(-50%); }
        .c-left { left: 5px; top: 50%; transform: translateY(-50%); }
        .c-right { right: 5px; top: 50%; transform: translateY(-50%); }
        .c-dot { position: absolute; width: 14px; height: 14px; background: var(--primary); border-radius: 50%; border: 2px solid #fff; transform: translate(-50%, -50%); box-shadow: 0 2px 5px rgba(211,125,110,0.5); }

</head>

        },

    function startTest() {
        const input = document.getElementById('pwd').value.trim();
        // 强鉴权逻辑
        if(input !== VALID_PWD) {
            alert("密钥无效，请联系【测测看文化创意工作室】获取专属正版密钥。");
            return;
        }
        document.getElementById('view-login').classList.remove('active');
        document.getElementById('view-quiz').classList.add('active');
        renderQ();
    }

    const letters = ['A','B','C','D','E'];
    function renderQ() {
        if(currQ >= QData.length) {
            startLoading();
            return;
        }
        document.getElementById('q-num').innerText = `深入解析进度 ${String(currQ+1).padStart(2,'0')} / 25`;
        document.getElementById('q-text').innerText = QData[currQ].q;
        
        const box = document.getElementById('opts-box');
        box.innerHTML = '';
        QData[currQ].o.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<span class="opt-letter">${letters[idx]}</span> <span>${opt[0]}</span>`;
            div.onclick = () => {
                for(let i=0; i<5; i++) totalScore.radar[i] += opt[1][i];
                totalScore.coord.x += opt[1][5];
                totalScore.coord.y += opt[1][6];
                currQ++;
                renderQ();
            };
            box.appendChild(div);
        });
    }

    function startLoading() {
        document.getElementById('view-quiz').classList.remove('active');
        document.getElementById('view-loading').classList.add('active');
        
        const msgs = ["正在扫描认知神经元...", "正在拆解潜意识防线...", "正在构建五维人格多边形...", "匹配历史科学家脑电波图谱..."];
        let mIdx = 0;
        const msgEl = document.getElementById('loading-msg');
        const timer = setInterval(() => {
            mIdx++;
            if(mIdx < msgs.length) {
                msgEl.style.opacity = 0;
                setTimeout(()=> { msgEl.innerText = msgs[mIdx]; msgEl.style.opacity = 1; }, 300);
            } else {
                clearInterval(timer);
                showResult();
            }
        }, 1200);
    }

    function showResult() {
        document.getElementById('view-loading').classList.remove('active');
        document.getElementById('view-result').classList.add('active');

        let quad = "Q1";
        const x = totalScore.coord.x;
        const y = totalScore.coord.y;
        if(x >= 0 && y >= 0) quad = "Q1"; 
        if(x < 0 && y >= 0) quad = "Q2";  
        if(x < 0 && y < 0) quad = "Q3";   
        if(x >= 0 && y < 0) quad = "Q4";  

        const arc = Archetypes[quad];
        document.getElementById('res-name').innerText = arc.name;
        document.getElementById('res-desc').innerText = arc.desc;
        
        const tagsBox = document.getElementById('res-tags');
        tagsBox.innerHTML = '';
        arc.tags.forEach(t => {
            tagsBox.innerHTML += `<span class="tag">${t}</span>`;
        });

        let limit = 50; 
        let px = ((x + limit) / (limit * 2)) * 100;
        let py = ((limit - y) / (limit * 2)) * 100; 
        px = Math.max(15, Math.min(px, 85));
        py = Math.max(15, Math.min(py, 85));
        setTimeout(()=>{
            document.getElementById('c-dot').style.left = `${px}%`;
            document.getElementById('c-dot').style.top = `${py}%`;
        }, 500);

        const maxVal = Math.max(...totalScore.radar, 1);
        const radarData = totalScore.radar.map(v => Math.round((v / maxVal) * 100));
        drawRadar(radarData);
    }

    function drawRadar(data) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        Chart.defaults.font.family = '"PingFang SC", sans-serif';
        Chart.defaults.color = '#999';

        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['绝对逻辑', '精神直觉', '现实行动', '深度共情', '秩序构建'],
                datasets: [{
                    data: data,
                    backgroundColor: 'rgba(211, 125, 110, 0.2)',
                    borderColor: '#D37D6E',
                    borderWidth: 2,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#D37D6E',
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 }, 
                scales: {
                    r: {
                        angleLines: { color: 'rgba(0,0,0,0.05)' },
                        grid: { color: 'rgba(0,0,0,0.05)' },
                        pointLabels: { font: { size: 12, weight: 'bold' }, color: '#4A4A4A' },
                        ticks: { display: false, min: 0, max: 100 }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function saveImg() {
        const btn = document.getElementById('btn-save');
        btn.innerText = "生成中，请稍候...";
        btn.style.opacity = "0.6";
        
        window.scrollTo(0,0);
        const target = document.getElementById('poster');

        html2canvas(target, {
            scale: window.devicePixelRatio * 2,
            useCORS: true,
            backgroundColor: "#FFFFFF"
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `科学家心智原型测试.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            btn.innerText = "已保存！快去分享吧";
            btn.style.background = "var(--green)";
            
            setTimeout(() => {
                btn.innerText = "一键生成专属图文海报";
                btn.style.background = "";
                btn.style.opacity = "1";
            }, 3000);
        });
    }
