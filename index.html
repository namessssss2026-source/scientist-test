<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>深度认知剖析：你的底层科学家原型</title>
    <style>
        :root {
            --primary: #2C3E50;
            --accent: #E74C3C;
            --bg: #F9F9FB;
            --text: #333333;
            --card-bg: #FFFFFF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; background: var(--card-bg); box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow-x: hidden; position: relative; }
        
        /* 模块化视图切换 */
        .view { display: none; padding: 40px 24px; animation: fadeIn 0.5s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2 { color: var(--primary); margin-bottom: 20px; font-weight: 600; text-align: center; }
        p { color: #666; margin-bottom: 24px; font-size: 15px; }
        
        /* 表单与按钮 */
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 20px; outline: none; transition: 0.3s; text-align: center;}
        input[type="text"]:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        
        /* 题库样式 */
        .progress { font-size: 12px; color: #999; text-align: center; margin-bottom: 30px; letter-spacing: 1px; }
        .question-text { font-size: 18px; color: var(--primary); font-weight: 500; margin-bottom: 30px; text-align: justify; }
        .option { background: var(--bg); border: 1px solid #eee; padding: 16px; border-radius: 12px; margin-bottom: 16px; cursor: pointer; transition: 0.2s; }
        .option:active { background: #e0e5ec; }
        
        /* 结果页样式 */
        .disclaimer { font-size: 12px; color: #aaa; text-align: center; border-top: 1px dashed #eee; padding-top: 20px; margin-top: 40px; }
        .result-title { font-size: 24px; color: var(--accent); margin-bottom: 10px; }
        
        /* 坐标轴绘制 */
        .chart-container { position: relative; width: 280px; height: 280px; margin: 30px auto; background: #fafafa; border-radius: 50%; border: 2px solid #eee; }
        .axis-x, .axis-y { position: absolute; background: #ccc; }
        .axis-x { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }
        .axis-y { width: 2px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
        .label { position: absolute; font-size: 10px; color: #888; }
        .label-top { top: 5px; left: 50%; transform: translateX(-50%); }
        .label-bottom { bottom: 5px; left: 50%; transform: translateX(-50%); }
        .label-left { left: 5px; top: 50%; transform: translateY(-50%); }
        .label-right { right: 5px; top: 50%; transform: translateY(-50%); }
        .dot { position: absolute; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(231,76,60,0.5); transition: 1s ease-out; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. 鉴权与免责声明页 -->
    <div id="view-login" class="view active">
        <h1>深层心智架构测试</h1>
        <p style="text-align: center; font-size: 13px;">—— 探寻你的人格底层科学原型 ——</p>
        <p style="font-size: 13px; color: #888; background: #f5f5f5; padding: 15px; border-radius: 8px;">
            <strong>【知情声明】</strong><br>
            本测试基于多维度人格动力学（Multidimensional Personality Dynamics）与认知信息加工模型构建。测试结果是对受测者潜意识信息处理倾向的概率性映射，仅供自我探索、认知升级参考，不具备临床医学与心理诊断效力。
        </p>
        <input type="text" id="access-code" placeholder="请输入专属访问密钥" autocomplete="off">
        <button class="btn" onclick="verifyCode()">开启潜意识解析</button>
    </div>

    <!-- 2. 测试问答页 -->
    <div id="view-quiz" class="view">
        <div class="progress" id="progress">1 / 10</div>
        <div class="question-text" id="question">加载中...</div>
        <div id="options-container"></div>
    </div>

    <!-- 3. 结果页 -->
    <div id="view-result" class="view">
        <h2 style="font-size: 16px; color: #666; margin-bottom: 5px;">你的心智原型映射为：</h2>
        <h1 class="result-title" id="scientist-name">爱因斯坦</h1>
        <p id="scientist-desc" style="text-align: justify; font-weight: 500;">解析加载中...</p>
        
        <div class="chart-container">
            <div class="axis-x"></div>
            <div class="axis-y"></div>
            <div class="label label-top">抽象构想</div>
            <div class="label label-bottom">具象现实</div>
            <div class="label label-left">感性直觉</div>
            <div class="label label-right">理性逻辑</div>
            <!-- 坐标系中的红点 -->
            <div class="dot" id="result-dot" style="top: 50%; left: 50%;"></div>
        </div>
        
        <p id="scientist-detail" style="font-size: 14px; color: #666; text-align: justify;"></p>
        
        <div class="disclaimer">
            最终解释权归测试发布方所有<br>请截屏保存你的专属解析卡片
        </div>
    </div>
</div>

<script>
    /**
     * 大师级架构：数据与逻辑严格分离
     * 密码已通过 Base64 轻量级混淆 (Astra2024 -> QXN0cmEyMDI0)
     */
    const VALID_HASH = "QXN0cmEyMDI0"; 

    // 核心状态机
    const State = {
        currentQ: 0,
        scoreX: 0.1, // 初始微小偏移，防止绝对0点
        scoreY: 0.1
    };

    // 题库（针对小红书优化：黑话+生活场景，建议配置 10-20 题）
    const Questions = [
        {
            q: "面对海量且杂乱的碎片化信息，你的潜意识处理机制通常是：",
            opts: [
                { text: "建立分类框架，提炼底层逻辑规则", x: 2, y: 1 },
                { text: "依赖直觉捕捉那些让我产生共鸣的节点", x: -2, y: 0 },
                { text: "迅速寻找其中马上能用得上的实用工具", x: 1, y: -2 }
            ]
        },
        {
            q: "当你的生活秩序遭遇突发性的『熵增』（即意外打乱计划）时：",
            opts: [
                { text: "情绪出现波动，顺应变化体验未知的可能性", x: -1, y: -1 },
                { text: "大脑迅速开始重新计算资源，构建新预案", x: 2, y: -1 },
                { text: "觉得有趣，思考这种意外背后是否有某种必然性", x: 1, y: 2 }
            ]
        },
        {
            q: "如果给你一个月时间深度钻研某件事，你更倾向于：",
            opts: [
                { text: "推演一种极具颠覆性但尚未被证明的理论假设", x: 1, y: 2 },
                { text: "亲手打造或优化一个能切实提高效率的系统", x: 2, y: -2 },
                { text: "研究人类情感、心理与自然法则的连结", x: -2, y: 1 }
            ]
        },
        {
            q: "在团队协作中出现分歧，你最无法忍受的是：",
            opts: [
                { text: "逻辑漏洞百出，且没有数据支撑的盲目推进", x: 2, y: 0 },
                { text: "为了效率而彻底忽视他人的情感消耗", x: -2, y: -1 },
                { text: "只看眼前利益，缺乏宏观战略视野的短视行为", x: 0, y: 2 }
            ]
        },
        {
            q: "凝视浩瀚星空时，你脑海中最常浮现的念头是：",
            opts: [
                { text: "宇宙的边界究竟在哪？其运作公式是什么？", x: 1, y: 2 },
                { text: "人类如此渺小，我们的存在意义何在？", x: -2, y: 1 },
                { text: "什么时候我们能造出跨星际航行的引擎？", x: 1, y: -2 }
            ]
        }
        // 可继续向下无限添加题目
    ];

    // 科学家档案字典 (四象限)
    const Profiles = {
        "Q1": { 
            // X>0 理性, Y>0 理论
            name: "阿尔伯特·爱因斯坦 (理论先知)", 
            desc: "「超越维度的思考者」",
            detail: "你拥有极高维度的抽象认知能力。你不在乎表象的繁杂，你只关心事物运转的『底层物理法则』。你倾向于在精神世界构建庞大的理论迷宫，你是纯粹的思想家。"
        },
        "Q2": { 
            // X<0 感性, Y>0 理论
            name: "卡尔·荣格 (深渊探索者)", 
            desc: "「潜意识汪洋的执光者」",
            detail: "你具有惊人的直觉与共情力。你对客观冷硬的数据不感兴趣，你更着迷于人类心智、哲学和抽象的精神世界。你能敏锐捕捉到隐藏在表象之下的集体无意识。"
        },
        "Q3": { 
            // X<0 感性, Y<0 现实
            name: "玛丽·居里 (治愈系炼金术士)", 
            desc: "「柔软而坚韧的践行者」",
            detail: "你将对世界的悲悯与感性化作了实际的行动力。你脚踏实地，注重事物能否带来真实的温度与价值。你不喜欢空谈，你更愿意在自己的领域默默耕耘，带来疗愈与改变。"
        },
        "Q4": { 
            // X>0 理性, Y<0 现实
            name: "尼古拉·特斯拉 (硬核造物主)", 
            desc: "「掌控雷电的极客工程师」",
            detail: "你是绝对的实用主义与逻辑控制狂。你不满足于理论的推演，你更享受将一切规则化、系统化并最终落地的过程。你是天生的架构师和发明家，致力于用技术重塑现实。"
        }
    };

    // 视图切换控制器
    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    // 伪鉴权逻辑
    function verifyCode() {
        const input = document.getElementById('access-code').value.trim();
        if(!input) {
            alert("请先输入专属密钥哦");
            return;
        }
        // Base64 对比，防外行 F12
        if(btoa(input) === VALID_HASH) {
            switchView('view-quiz');
            renderQuestion();
        } else {
            alert("密钥无效，请核对后重试");
        }
    }

    // 渲染题目
    function renderQuestion() {
        if(State.currentQ >= Questions.length) {
            calculateResult();
            return;
        }
        const qData = Questions[State.currentQ];
        document.getElementById('progress').innerText = `剖析进度：${State.currentQ + 1} / ${Questions.length}`;
        document.getElementById('question').innerText = qData.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = ''; // 清空上一题选项
        
        qData.opts.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = opt.text;
            // 防御性编程：使用闭包确保事件绑定的数据准确性
            btn.onclick = () => handleAnswer(opt.x, opt.y);
            container.appendChild(btn);
        });
    }

    // 处理答题
    function handleAnswer(deltaX, deltaY) {
        State.scoreX += deltaX;
        State.scoreY += deltaY;
        State.currentQ++;
        renderQuestion();
    }

    // 计算并展示结果
    function calculateResult() {
        switchView('view-result');
        
        // 象限判定
        let quadrant = "";
        if(State.scoreX > 0 && State.scoreY > 0) quadrant = "Q1";
        else if(State.scoreX < 0 && State.scoreY > 0) quadrant = "Q2";
        else if(State.scoreX < 0 && State.scoreY < 0) quadrant = "Q3";
        else quadrant = "Q4";

        const profile = Profiles[quadrant];
        document.getElementById('scientist-name').innerText = profile.name;
        document.getElementById('scientist-desc').innerText = profile.desc;
        document.getElementById('scientist-detail').innerText = profile.detail;

        // 绘制散点 (映射到 0-100% 的 CSS 定位)
        // 假设理论最大分为 maxScore (根据题数估算，这里设为动态计算)
        const maxLimit = Questions.length * 2; 
        
        // 归一化处理，防止点超出圆圈边界 (-maxLimit 到 maxLimit 映射到 10% 到 90%)
        let posX = ((State.scoreX + maxLimit) / (maxLimit * 2)) * 100;
        let posY = ((maxLimit - State.scoreY) / (maxLimit * 2)) * 100; // Y轴网页坐标向下递增，需反转

        // 边界约束
        posX = Math.max(10, Math.min(posX, 90));
        posY = Math.max(10, Math.min(posY, 90));

        // 延迟执行动画，增加仪式感
        setTimeout(() => {
            const dot = document.getElementById('result-dot');
            dot.style.left = `${posX}%`;
            dot.style.top = `${posY}%`;
        }, 100);
    }
</script>
</body>
</html>
